<!DOCTYPE html>
<html lang = "es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BadKayne</title>
</head>

<head>
<body>

    <h1>ENJOY MY ART</h1>

    <div class="buttons-row2">
        <button id="contact">CONTACT</button>
        <a href="biography.html">
            <button>BIOGRAPHY</button>
        </a>

        <div id="contact-dropdown" class="dropdown-content">
            <p>
                Instragram: 
                <a href="https://www.instagram.com/badkayne" target="_blank">
                    @badkayne
                </a>
            </p>

            <p>
                SoundCloud: 
                <a href="https://on.soundcloud.com/eyY5tv37U2LvNjTszB" target="_blank">
                    badkayne
                </a>
            </p>
        </div>
    </div>

    <div class="buttons-row">
        <button data-genre="all">Playlist</button>
        <button data-genre="Single">Single</button>
        <button data-genre="LP/EPs">LP/EPs</button>
    </div>
        
    <div class="songs-container">

        <div class="song-block Single">
            <div class="image-left">
                <img src="9696.jpg" alt="Descripción">
            </div>
        
            <div class="text-right">
                 <p>
                    9696
                </p>
                
                <audio controls>
                    <source src="9696.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="song-block Single">
            <div class="image-left">
                <img src="Negro2.png" alt="Descripción">
            </div>
        
            <div class="text-right">
                 <p>
                    Instrumental 1
                </p>
                
                <audio controls>
                    <source src="instrumental-1.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
         
        

        <div class="song-block LP/EPs">
            <div class="image-left">
                <img src="Portada1.png" alt="Descripción">
            </div>

            <div class="text-right">
                 <p>
                    DISTORSIÓN TROPICAL
                </p>

                <a href="album1.html" class="return-button"> PLAY</a>

            </div>

        </div>
            
            

    </div>

    <style>
        
        h1{
            text-align: center;
            font-family:'Times New Roman';
            color: rgb(0, 0, 0);
            font-weight: bold;
            font-size: 4rem;
            text-shadow: 6px 4px 6px rgb(212, 130, 22);
            margin-top: 30px;
        }

        body{
            margin: 0;                 
            min-height: 100vh;          
            background-color: rgb(224, 136, 19); 
            background-image: url("cover web.png"); 
            background-size: cover;      
            background-repeat: no-repeat; 
            background-position: center top; 
            background-attachment: fixed; 
        }

        .buttons-row2{
            position: absolute;
            bottom: 870px;
            left: 1650px;
        }

        .buttons-row2 button{
            margin: 0 10px;
            text-align: center;
            font-weight: bold;

            border: none;
            padding: 0;
            background: none;
            background-color: transparent;

            font-size: 1rem;
            cursor: pointer;
            color: rgb(0, 0, 0);
            transition: all 0.3s ease;
            font-family: "Time New Roman";

            border-radius: 15px;
        }

        .buttons-row{
            text-align: center;
            margin: 50px;
        }
        
        .buttons-row button {
            margin: 0 10px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: 1px solid black;
            transition: 0.3s;
            border-radius: 15px;
            background-color: rgba(206, 138, 36, 0.4);
        }

        .buttons-row button:hover {
            background: rgba(255,255,255,0.3);
        }

        .songs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding-bottom: 100px;
        }

        .song-block {
            display: flex;
            align-items: center;
            gap: 30px;
            max-width: 1200px;
            width: 90%;
            background-color: rgba(206, 138, 36, 0.5);
            border-radius: 15px;
        }

        .song-block .image-left img {
            max-width: 400px;
        }

        .song-block .text-right p {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .song-block .text-right{
            flex: 1;
        }        
        
        .dropdown-content{
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(255,255,255,0.3);

            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            width: 200px;

            box-shadow: 0 5px 15px rgba(0,0,0,0.2);

            z-index: 9999;
            pointer-events: auto;
        }

        .dropdown-content p{
            margin: 5px 0;
            z-index: 1000;
        }

        .song-block audio {
            margin-top: 15px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(8px);
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 550px;
            width: 100%;
        }

        .song-block audio {
            margin-top: 15px;
            height: 40px;
            width: 100%;
            background: none;
        }

        .dropdown-content {
            background-color: rgba(206, 138, 36, 0.5);
        }

        .return-button {
            margin: 0 10px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: 1px solid black;
            transition: 0.3s;
            color: black;
            font-weight: bold;
            text-decoration: none;
            background-color: rgba(179, 111, 9, 0.5);
            border-radius: 15px;
        }

    </style>

    <script>
        const buttons = document.querySelectorAll('.buttons-row button');
        const songs = document.querySelectorAll('.song-block');

        buttons.forEach(button => {
        button.addEventListener('click', () => {
        const genre = button.getAttribute('data-genre');

        songs.forEach(song => {
            
            if (song.classList.contains('LP/EPs') && genre !== 'LP/EPs') {
                song.style.display = 'none';
            } else if (genre === 'all') {
                song.style.display = 'flex';
            } else if (song.classList.contains(genre)) {
                song.style.display = 'flex';
            } else {
                song.style.display = 'none';
            }
        });
        });
        });

        const contactBtn = document.getElementById("contact");
        const dropdown = document.getElementById("contact-dropdown");

        contactBtn.addEventListener("click", () => {
            if (dropdown.style.display === "block") {
                dropdown.style.display = "none";
            } else {
                dropdown.style.display = "block";
            }
        });

    </script>

</body>
</head>
